[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --html=../reports/python_report.html --self-contained-html
markers =
    smoke: Smoke tests
    regression: Regression tests
    api: API tests
    excel: Excel-driven tests
    url: URL smoke tests
